<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>🤡</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>

<body>
<div class="video-container">
    <video autoplay loop muted poster="/images/frame-1.jpg">
        <source src="videos/genaaid.mp4" type="video/mp4">
    </video>
    <div class="text-overlay">
        <h1>
            <span class="name">William</span>
            <span class="emoji">🔥💯💅</span>
        </h1>
    </div>
</div>

<audio id="entry_of_the_gladiators" loop>
    <source src="audio/entry_of_the_gladiators.mp3" type="audio/mpeg">
</audio>

<script>
    const music = document.getElementById("entry_of_the_gladiators");
    document.addEventListener("click", () => {
        music.play();
    }, { once: true });
</script>

</body>
</html>
